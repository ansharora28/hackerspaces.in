<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:image" content="{{ get_url(path='thumb.jpg') }}">
  <link rel="shortcut icon" href="{{ get_url(path='favicon.ico') }}" />
  <link rel="stylesheet" href="{{ get_url(path='style.css', cachebust=true) }}">
  {% block meta %}{% endblock %}
</head>
<body>
  <header>
    <h1><a href="{{ get_url(path='/') }}">hackerspaces.in</a></h1>
    {% block subtitle %}{% endblock %}
    <nav class="header-right">
      <a href="https://github.com/ansharora28/makerspace">Source</a>
      <span>Add or correct something? <a href="">Send suggestions</a></span>
    </nav>
  </header>
  {% block content %}{% endblock %}
  {% block scripts %}<script src="{{ get_url(path='main.js', cachebust=true) }}" defer></script>{% endblock %}
</body>
</html>
