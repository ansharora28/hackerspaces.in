<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:image" content="{{ get_url(path='thumb.png') }}">
  <link rel="shortcut icon" href="{{ get_url(path='favicon.svg') }}" />
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  {% block meta %}{% endblock %}
</head>
<body>
  <header>
    <h1><a href="{{ get_url(path='/') }}">ooru.space</a></h1>
    {% block subtitle %}{% endblock %}
    <span class="header-mail">Add or correct something? Send an <a href="mailto:ooru@samagata.org">e-mail</a></span>
  </header>
  {% block content %}{% endblock %}
  {% block scripts %}<script src="{{ get_url(path='main.js') }}" defer></script>{% endblock %}
</body>
</html>
